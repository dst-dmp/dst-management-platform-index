<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Miracle">
    <meta name="description" content="Miracle 的导航页">
    <meta name="keywords" content="饥荒, 饥荒管理平台, DMP, 导航, Miracle, Miraclesses, 黑名单, DST, Block, 博客">
    <title>导航页</title>
    <link href="img/favicon.ico" rel="icon">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #08080a;
            --bg-card: #111114;
            --bg-card-hover: #18181d;
            --border: rgba(255,255,255,.06);
            --border-hover: rgba(255,255,255,.12);
            --text: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-tertiary: #6e6e73;
            --accent: #8C57FF;
            --accent-glow: rgba(140,87,255,.18);
            --accent-soft: rgba(140,87,255,.08);
            --glass-highlight: rgba(255,255,255,.14);
            --glass-base: rgba(255,255,255,.03);
            --glass-tint: rgba(140,87,255,.07);
            --glass-edge: rgba(255,255,255,.1);
            --btn-secondary-bg: rgba(255,255,255,.05);
            --btn-secondary-hover: rgba(255,255,255,.08);
            --card-shadow: rgba(0,0,0,.3);
            --particle-rgb: 140,87,255;
            --radius-sm: 12px;
            --radius: 20px;
            --radius-lg: 28px;
        }
        [data-theme="light"] {
            --bg: #f5f5f7;
            --bg-card: #ffffff;
            --bg-card-hover: #fafafa;
            --border: rgba(0,0,0,.06);
            --border-hover: rgba(0,0,0,.12);
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #a1a1a6;
            --accent-glow: rgba(140,87,255,.12);
            --accent-soft: rgba(140,87,255,.06);
            --glass-highlight: rgba(255,255,255,.65);
            --glass-base: rgba(255,255,255,.25);
            --glass-tint: rgba(140,87,255,.05);
            --glass-edge: rgba(255,255,255,.35);
            --btn-secondary-bg: rgba(0,0,0,.04);
            --btn-secondary-hover: rgba(0,0,0,.07);
            --card-shadow: rgba(0,0,0,.08);
            --particle-rgb: 120,70,220;
            color-scheme: light;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background .5s ease, color .5s ease;
            padding: 24px;
        }
        ::selection { background: var(--accent); color: #fff; }

        /* ─── Canvas Particles ─── */
        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* ─── Theme Toggle ─── */
        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            z-index: 110; width: 40px; height: 40px;
            border-radius: 50%; border: 1px solid var(--border);
            background: var(--glass-highlight);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .4s cubic-bezier(.25,.1,.25,1);
            color: var(--text-secondary);
        }
        .theme-toggle:hover {
            border-color: var(--border-hover); color: var(--text);
            transform: scale(1.08);
        }
        .theme-toggle svg { width: 18px; height: 18px; transition: transform .5s cubic-bezier(.25,.1,.25,1); }
        .theme-toggle .icon-sun, .theme-toggle .icon-moon {
            position: absolute; transition: all .5s cubic-bezier(.25,.1,.25,1);
        }
        [data-theme="light"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(.5); }
        [data-theme="light"] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0) scale(1); }
        .theme-toggle .icon-sun { opacity: 0; transform: rotate(-90deg) scale(.5); }
        .theme-toggle .icon-moon { opacity: 1; transform: rotate(0) scale(1); }

        /* ─── Main Content ─── */
        .main {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 720px;
        }

        /* ─── Header ─── */
        .header {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 24px;
        }
        .header-brand {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; margin-bottom: 12px;
        }
        .header-brand img { height: 40px; width: auto; }
        .header-brand span {
            color: var(--text); font-weight: 700; font-size: 22px;
            letter-spacing: -.4px;
        }
        .header-tagline {
            font-size: 14px; color: var(--text-tertiary);
            letter-spacing: -.1px;
        }

        /* ─── Nav Cards Grid ─── */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }
        .nav-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px;
            text-decoration: none; color: inherit;
            transition: all .4s cubic-bezier(.25,.1,.25,1);
            display: flex; flex-direction: column; gap: 10px;
            position: relative; overflow: hidden;
        }
        .nav-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(500px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--accent-soft), transparent 70%);
            opacity: 0; transition: opacity .4s ease;
            z-index: 0;
        }
        .nav-card:hover::before { opacity: 1; }
        .nav-card::after {
            content: ''; position: absolute; top: -1px; left: 20px; right: 20px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0; transition: opacity .4s ease;
            z-index: 1;
        }
        .nav-card:hover::after { opacity: 1; }
        .nav-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px var(--card-shadow);
        }
        .nav-card > * { position: relative; z-index: 2; }
        .nav-card .card-icon {
            width: 44px; height: 44px; border-radius: var(--radius-sm);
            background: var(--accent-soft); display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--accent); flex-shrink: 0;
        }
        .nav-card h3 {
            font-size: 18px; font-weight: 600; letter-spacing: -.3px;
        }
        .nav-card .card-desc {
            font-size: 13px; color: var(--text-secondary); line-height: 1.55;
            letter-spacing: -.1px;
        }
        .nav-card .card-domain {
            font-size: 12px; color: var(--text-tertiary); letter-spacing: -.1px;
            margin-top: auto; padding-top: 4px;
            transition: color .3s ease;
        }
        .nav-card:hover .card-domain { color: var(--accent); }

        /* ─── Footer ─── */
        .footer {
            position: relative; z-index: 1;
            margin-top: 48px;
            font-size: 13px; color: var(--text-tertiary);
            letter-spacing: -.1px; text-align: center;
        }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .nav-grid { grid-template-columns: 1fr; }
            .nav-card { padding: 28px 24px; }
            .header-brand span { font-size: 19px; }
            .header { margin-bottom: 36px; }
            body { padding: 60px 20px 40px; justify-content: flex-start; padding-top: 80px; }
        }
    </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="切换明暗主题">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
</button>

<canvas id="particles-canvas"></canvas>

<main class="main">
    <header class="header">
        <a href="#" class="header-brand">
            <span>Miracle</span>
        </a>
        <p class="header-tagline">相关站点</p>
    </header>

    <div class="nav-grid">
        <!-- DMP 官网 -->
        <a href="https://dmp.miraclesses.top" class="nav-card" target="_blank" rel="noopener">
            <div class="card-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <h3>饥荒管理平台官网</h3>
            <p class="card-desc">一站式饥荒专用服务器管理方案，一键开服，智能运维。</p>
            <span class="card-domain">dmp.miraclesses.top</span>
        </a>

        <!-- 文档 -->
        <a href="https://docs.miraclesses.top" class="nav-card" target="_blank" rel="noopener">
            <div class="card-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
            </div>
            <h3>饥荒管理平台文档</h3>
            <p class="card-desc">饥荒管理平台使用指南与常见问题解答。</p>
            <span class="card-domain">docs.miraclesses.top</span>
        </a>

        <!-- 黑名单 -->
        <a href="https://dst-block.miraclesses.top" class="nav-card" target="_blank" rel="noopener">
            <div class="card-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h3>DST Block</h3>
            <p class="card-desc">DST Block 是一个社区驱动的饥荒联机版黑名单管理平台。</p>
            <span class="card-domain">dst-block.miraclesses.top</span>
        </a>

        <!-- 博客 -->
        <a href="https://blog.miraclesses.top" class="nav-card" target="_blank" rel="noopener">
            <div class="card-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <h3>我的博客</h3>
            <p class="card-desc">一个破破烂烂的垃圾堆。</p>
            <span class="card-domain">blog.miraclesses.top</span>
        </a>
    </div>

    <footer class="footer">
        &copy; <span id="currentYear"></span> Miracle
    </footer>
</main>

<script>
(function() {
    'use strict';

    // ─── Theme Toggle ───
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    let particleRgb = getComputedStyle(html).getPropertyValue('--particle-rgb').trim();

    function setTheme(theme) {
        if (theme === 'light') {
            html.setAttribute('data-theme', 'light');
        } else {
            html.removeAttribute('data-theme');
        }
        particleRgb = getComputedStyle(html).getPropertyValue('--particle-rgb').trim();
        localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
        var current = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        setTheme(current);
    }

    var saved = localStorage.getItem('theme');
    if (saved === 'light') {
        setTheme('light');
    } else {
        setTheme('dark');
    }

    themeToggle.addEventListener('click', toggleTheme);

    // ─── Footer Year ───
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // ─── Floating Ember Particles ───
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;
    let mouseX = -100, mouseY = -100;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.reset(true);
        }
        reset(init) {
            this.x = Math.random() * canvas.width;
            this.y = init ? Math.random() * canvas.height : canvas.height + 20;
            this.size = Math.random() * 2 + 0.8;
            this.speedY = -(Math.random() * 0.5 + 0.2);
            this.speedX = (Math.random() - 0.5) * 0.4;
            this.opacity = Math.random() * 0.5 + 0.15;
            this.opacitySpeed = Math.random() * 0.004 + 0.002;
            this.life = 0;
            this.maxLife = Math.random() * 400 + 300;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = Math.random() * 0.02 + 0.005;
        }
        update() {
            this.wobble += this.wobbleSpeed;
            this.y += this.speedY + Math.sin(this.wobble) * 0.3;
            this.x += this.speedX;
            this.life++;
            this.opacity -= this.opacitySpeed;
            const dx = this.x - mouseX;
            const dy = this.y - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
                const force = (120 - dist) / 120 * 0.8;
                this.x += (dx / dist) * force;
                this.y += (dy / dist) * force;
            }
            if (this.life > this.maxLife || this.opacity <= 0 || this.y < -20) {
                this.reset(false);
            }
        }
        draw(ctx) {
            ctx.beginPath();
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
            gradient.addColorStop(0, `rgba(${particleRgb},${this.opacity})`);
            gradient.addColorStop(1, `rgba(${particleRgb},0)`);
            ctx.fillStyle = gradient;
            ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const PARTICLE_COUNT = 55;
    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(function(p) { p.update(); p.draw(ctx); });
        animationId = requestAnimationFrame(animate);
    }
    animate();

    // ─── Nav Card Mouse Glow ───
    document.querySelectorAll('.nav-card').forEach(function(card) {
        card.addEventListener('mousemove', function(e) {
            const rect = card.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            card.style.setProperty('--mouse-x', x + '%');
            card.style.setProperty('--mouse-y', y + '%');
        });
    });
})();
</script>

</body>
</html>
