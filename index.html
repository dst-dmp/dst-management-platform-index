<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Miracle">
    <meta name="description" content="Miracle 的导航页">
    <meta name="keywords" content="饥荒, 饥荒管理平台, DMP, 导航, Miracle, Miraclesses, 黑名单, DST, Block, 博客">
    <title>导航页</title>
    <link href="img/favicon.ico" rel="icon">

    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════ */
        :root {
            /* Surface */
            --bg: #000000;
            --bg-elevated: rgba(255, 255, 255, 0.03);
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-card-hover: rgba(255, 255, 255, 0.09);

            /* Border */
            --border: rgba(255, 255, 255, 0.07);
            --border-hover: rgba(255, 255, 255, 0.14);
            --border-accent: rgba(139, 92, 246, 0.35);

            /* Text */
            --text: #f5f5f7;
            --text-secondary: #98989d;
            --text-tertiary: #5c5c62;

            /* Accent */
            --accent: #8b5cf6;
            --accent-soft: rgba(139, 92, 246, 0.08);
            --accent-glow: rgba(139, 92, 246, 0.18);

            /* Shadow */
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4);
            --shadow-card-hover: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 1px rgba(255, 255, 255, 0.1);

            /* Radius */
            --radius-sm: 10px;
            --radius: 18px;
            --radius-lg: 24px;

            /* Orb colors (dark) */
            --orb-1: rgba(139, 92, 246, 0.12);
            --orb-2: rgba(59, 130, 246, 0.08);
            --orb-3: rgba(236, 72, 153, 0.06);

            /* Misc */
            --glass-blur: 24px;
            --transition-fast: 200ms;
            --transition-normal: 400ms;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* Light theme */
        [data-theme="light"] {
            --bg: #f5f5f7;
            --bg-elevated: rgba(0, 0, 0, 0.02);
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-card-hover: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.07);
            --border-hover: rgba(0, 0, 0, 0.14);
            --border-accent: rgba(139, 92, 246, 0.3);
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #aeaeb2;
            --accent-soft: rgba(139, 92, 246, 0.06);
            --accent-glow: rgba(139, 92, 246, 0.1);
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-card-hover: 0 12px 40px rgba(0, 0, 0, 0.1), 0 0 1px rgba(0, 0, 0, 0.1);
            --orb-1: rgba(139, 92, 246, 0.08);
            --orb-2: rgba(59, 130, 246, 0.05);
            --orb-3: rgba(236, 72, 153, 0.04);
        }

        /* ═══════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
            "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.47059;
            letter-spacing: -0.01em;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            transition: background 0.6s var(--ease-out), color 0.6s var(--ease-out);
            overflow-x: hidden;
            position: relative;
        }

        ::selection {
            background: var(--accent);
            color: #fff;
        }

        /* ═══════════════════════════════════════════
           AMBIENT BACKGROUND ORBS
           ═══════════════════════════════════════════ */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            will-change: transform;
            transition: opacity 0.6s var(--ease-out);
        }

        .bg-orb-1 {
            width: 560px;
            height: 560px;
            background: var(--orb-1);
            top: -15%;
            left: -10%;
        }

        .bg-orb-2 {
            width: 480px;
            height: 480px;
            background: var(--orb-2);
            bottom: -20%;
            right: -8%;
        }

        .bg-orb-3 {
            width: 340px;
            height: 340px;
            background: var(--orb-3);
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
        }

        /* Subtle grain overlay for texture */
        .bg-grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ═══════════════════════════════════════════
           THEME TOGGLE
           ═══════════════════════════════════════════ */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition:
                background var(--transition-normal) var(--ease-out),
                border-color var(--transition-normal) var(--ease-out),
                transform var(--transition-fast) var(--ease-spring),
                box-shadow var(--transition-normal) var(--ease-out);
            box-shadow: var(--shadow-card);
        }

        .theme-toggle:hover {
            border-color: var(--border-hover);
            color: var(--text);
            transform: scale(1.08);
            box-shadow: var(--shadow-card-hover);
        }

        .theme-toggle:active {
            transform: scale(0.93);
            transition: transform 100ms var(--ease-out);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            position: absolute;
            transition:
                opacity 0.5s var(--ease-out),
                transform 0.5s var(--ease-spring);
        }

        /* Dark: moon visible, sun hidden */
        .theme-toggle .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        .theme-toggle .icon-sun {
            opacity: 0;
            transform: rotate(-90deg) scale(0.3);
        }

        /* Light: sun visible, moon hidden */
        [data-theme="light"] .theme-toggle .icon-moon {
            opacity: 0;
            transform: rotate(90deg) scale(0.3);
        }

        [data-theme="light"] .theme-toggle .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* ═══════════════════════════════════════════
           MAIN CONTAINER
           ═══════════════════════════════════════════ */
        .main {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 680px;
        }

        /* ═══════════════════════════════════════════
           HERO
           ═══════════════════════════════════════════ */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 56px;
            opacity: 0;
            transform: translateY(24px);
            animation: fade-up 0.8s var(--ease-out-expo) 0.1s forwards;
        }

        .hero-title {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 8px;
        }

        .hero-tagline {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: -0.01em;
            color: var(--text-tertiary);
        }

        /* ═══════════════════════════════════════════
           NAVIGATION GRID
           ═══════════════════════════════════════════ */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        .nav-card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 26px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--shadow-card);
            transition:
                background var(--transition-normal) var(--ease-out),
                border-color var(--transition-normal) var(--ease-out),
                transform 0.5s var(--ease-spring),
                box-shadow var(--transition-normal) var(--ease-out);

            /* Staggered entrance */
            opacity: 0;
            transform: translateY(28px);
            animation: fade-up 0.7s var(--ease-out-expo) forwards;
        }

        .nav-card:nth-child(1) { animation-delay: 0.2s; }
        .nav-card:nth-child(2) { animation-delay: 0.3s; }
        .nav-card:nth-child(3) { animation-delay: 0.4s; }
        .nav-card:nth-child(4) { animation-delay: 0.5s; }

        /* Card highlight that follows cursor */
        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                var(--accent-soft),
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.4s var(--ease-out);
            z-index: 0;
            pointer-events: none;
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        /* Top accent line on hover */
        .nav-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.5s var(--ease-out);
            z-index: 1;
            pointer-events: none;
        }

        .nav-card:hover::after {
            opacity: 0.7;
        }

        .nav-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover);
        }

        .nav-card:active {
            transform: translateY(-1px) scale(0.985);
            transition: transform 100ms var(--ease-out);
        }

        /* Card content stacking */
        .nav-card > * {
            position: relative;
            z-index: 2;
        }

        /* Card icon */
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition:
                background var(--transition-normal) var(--ease-out),
                transform var(--transition-normal) var(--ease-spring);
        }

        .nav-card:hover .card-icon {
            transform: scale(1.06);
        }

        .card-icon svg {
            width: 20px;
            height: 20px;
            transition: transform var(--transition-normal) var(--ease-spring);
        }

        .nav-card:hover .card-icon svg {
            transform: scale(1.08);
        }

        /* Card title */
        .nav-card h3 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.015em;
            line-height: 1.3;
            color: var(--text);
        }

        /* Card description */
        .card-desc {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: -0.005em;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        /* Card domain badge */
        .card-domain {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0;
            color: var(--text-tertiary);
            margin-top: auto;
            padding-top: 6px;
            transition: color var(--transition-normal) var(--ease-out);
        }

        .nav-card:hover .card-domain {
            color: var(--accent);
        }

        /* ═══════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════ */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: 56px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: -0.005em;
            color: var(--text-tertiary);
            text-align: center;
            opacity: 0;
            animation: fade-up 0.7s var(--ease-out-expo) 0.6s forwards;
        }

        /* ═══════════════════════════════════════════
           KEYFRAMES
           ═══════════════════════════════════════════ */
        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 600px) {
            body {
                padding: 60px 16px 40px;
                justify-content: flex-start;
                padding-top: 80px;
            }

            .nav-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .nav-card {
                padding: 24px 20px;
            }

            .hero {
                margin-bottom: 40px;
            }

            .hero-title {
                font-size: 32px;
            }

            .hero-tagline {
                font-size: 14px;
            }

            .bg-orb-1 {
                width: 360px;
                height: 360px;
                top: -20%;
                left: -30%;
            }

            .bg-orb-2 {
                width: 300px;
                height: 300px;
                bottom: -15%;
                right: -25%;
            }

            .bg-orb-3 {
                width: 220px;
                height: 220px;
            }
        }

        /* ═══════════════════════════════════════════
           REDUCED MOTION
           ═══════════════════════════════════════════ */
        @media (prefers-reduced-motion: reduce) {
            .nav-card,
            .hero,
            .footer {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .nav-card:hover {
                transform: none;
            }

            .nav-card:hover::before {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<!-- Ambient background orbs -->

<!-- Subtle grain texture -->
<div class="bg-grain" aria-hidden="true"></div>

<!-- Theme toggle -->

<script>
(function () {
    'use strict';

    /* ═══════════════════════════════════════
       THEME
       ═══════════════════════════════════════ */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    function setTheme(theme) {
        if (theme === 'light') {
            html.setAttribute('data-theme', 'light');
        } else {
            html.removeAttribute('data-theme');
        }
        try {
            localStorage.setItem('theme', theme);
        } catch (_) { /* quota exceeded, ignore */ }
    }

    function toggleTheme() {
        const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        setTheme(next);
    }

    const saved = (function () {
        try { return localStorage.getItem('theme'); } catch (_) { return null; }
    })();
    setTheme(saved === 'light' ? 'light' : 'dark');

    themeToggle.addEventListener('click', toggleTheme);

    /* ═══════════════════════════════════════
       FOOTER YEAR
       ═══════════════════════════════════════ */
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    /* ═══════════════════════════════════════
       CARD CURSOR GLOW
       ═══════════════════════════════════════ */
    document.querySelectorAll('.nav-card').forEach(function (card) {
        card.addEventListener('mousemove', function (e) {
            const rect = card.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            card.style.setProperty('--mouse-x', x + '%');
            card.style.setProperty('--mouse-y', y + '%');
        });
    });

    /* ═══════════════════════════════════════
       PARALLAX ORBS — subtle mouse response
       ═══════════════════════════════════════ */
    const orbs = document.querySelectorAll('.bg-orb');
    let orbRaf = null;

    document.addEventListener('mousemove', function (e) {
        if (orbRaf) return;
        orbRaf = requestAnimationFrame(function () {
            orbRaf = null;
            const x = (e.clientX / window.innerWidth - 0.5) * 2;  // -1…1
            const y = (e.clientY / window.innerHeight - 0.5) * 2;

            if (orbs[0]) {
                orbs[0].style.transform = 'translate(' + (x * 24) + 'px, ' + (y * 24) + 'px)';
            }
            if (orbs[1]) {
                orbs[1].style.transform = 'translate(' + (x * -18) + 'px, ' + (y * -18) + 'px)';
            }
            if (orbs[2]) {
                orbs[2].style.transform = 'translate(' + (x * 10) + 'px, ' + (y * 10) + 'px)';
            }
        });
    });
})();
</script>

</body>
